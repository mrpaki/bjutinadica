<!-- LIGHTBOX -->
<dialog class="lightbox" id="lightbox" aria-label="Pregled fotografije">
  <div class="lightbox-inner" id="lightbox-backdrop">
    <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Prethodna slika">&#8592;</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Sledeća slika">&#8594;</button>
    <button class="lightbox-close" id="lb-close" aria-label="Zatvori">&#10005;</button>
  </div>
</dialog>

<script>

  // ── FILTER ──
  const items = Array.from(document.querySelectorAll('.galerija-item'));
  const btns = document.querySelectorAll('.filter-btn');
  let activeFilter = 'sve';

  function applyFilter(filter) {
    activeFilter = filter;
    btns.forEach(b => b.classList.toggle('aktivan', b.dataset.filter === filter));
    items.forEach(item => {
      const match = filter === 'sve' || item.dataset.kategorija === filter;
      item.hidden = !match;
    });
    // update hash bez scroll-a
    history.replaceState(null, '', filter === 'sve' ? '#' : '#' + filter);
  }

  btns.forEach(btn => btn.addEventListener('click', () => applyFilter(btn.dataset.filter)));

  // deep-link po hash-u
  function applyHash() {
    const hash = location.hash.slice(1);
    const validFilters = ['manikir', 'pedikir', 'depilacija', 'sminkanje'];
    applyFilter(validFilters.includes(hash) ? hash : 'sve');
  }
  applyHash();
  window.addEventListener('hashchange', applyHash);

  // ── LIGHTBOX ──
  const dialog = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbClose = document.getElementById('lb-close');
  const lbPrev = document.getElementById('lb-prev');
  const lbNext = document.getElementById('lb-next');
  const lbBackdrop = document.getElementById('lightbox-backdrop');

  let currentIndex = 0;
  let lastFocused = null;

  function visibleItems() {
    return items.filter(i => !i.hidden);
  }

  function openLightbox(index) {
    const visible = visibleItems();
    currentIndex = index;
    const item = visible[currentIndex];
    if (!item) return;
    const img = item.querySelector('img');
    lbImg.src = img.src;
    lbImg.alt = img.alt;
    dialog.showModal();
    lbClose.focus();
  }

  function navigate(dir) {
    const visible = visibleItems();
    currentIndex = (currentIndex + dir + visible.length) % visible.length;
    const item = visible[currentIndex];
    const img = item.querySelector('img');
    lbImg.src = img.src;
    lbImg.alt = img.alt;
  }

  items.forEach((item, globalIdx) => {
    item.addEventListener('click', () => {
      lastFocused = item;
      const visible = visibleItems();
      const visIdx = visible.indexOf(item);
      openLightbox(visIdx);
    });
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); item.click(); }
    });
  });

  lbClose.addEventListener('click', () => dialog.close());
  lbPrev.addEventListener('click', () => navigate(-1));
  lbNext.addEventListener('click', () => navigate(1));

  // klik van slike zatvara
  lbBackdrop.addEventListener('click', e => {
    if (e.target === lbBackdrop) dialog.close();
  });

  dialog.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  dialog.addEventListener('close', () => {
    lbImg.src = '';
    if (lastFocused) lastFocused.focus();
  });
</script>

</body>
